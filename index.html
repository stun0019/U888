<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>運彩資訊平台 5.0</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

/* header */
header {
    padding: 14px;
    text-align: center;
    background: #111827;
    font-weight: bold;
}

/* layout */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 12px;
}

/* filters */
.filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 10px;
}

select {
    padding: 6px;
    border-radius: 6px;
}

/* card */
.card {
    background: #1f2937;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    background: #273449;
}

/* AI score */
.score {
    float: right;
    background: #2563eb;
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
}

/* detail page */
.page {
    display: none;
    max-width: 700px;
    margin: auto;
    padding: 20px;
}

.back {
    cursor: pointer;
    color: #60a5fa;
    margin-bottom: 10px;
    display: inline-block;
}

.ai-box {
    background: #0f172a;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
}

.loading {
    text-align: center;
    padding: 20px;
}
</style>

</head>

<body>

<header>運彩資訊平台 5.0（AI推薦版）</header>

<!-- LIST PAGE -->
<div class="container" id="listPage">

<div class="filters">

<select id="sport">
<option value="all">全部</option>
<option value="soccer">足球</option>
<option value="nba">NBA</option>
<option value="mlb">MLB</option>
</select>

</div>

<div id="list"></div>

</div>

<!-- DETAIL PAGE -->
<div class="page" id="detailPage">
<span class="back" onclick="back()">← 返回</span>
<div id="detail"></div>
</div>

<script>

/* DATA STORE */
let matches = [];

/* API */
const APIs = {
    soccer: "https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4328",
    nba: "https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4387",
    mlb: "https://statsapi.mlb.com/api/v1/schedule?sportId=1"
};

/* LOAD */
async function loadAll() {

    const [s, n, m] = await Promise.all([
        fetch(APIs.soccer).then(r => r.json()),
        fetch(APIs.nba).then(r => r.json()),
        fetch(APIs.mlb).then(r => r.json())
    ]);

    const soccer = (s.events || []).map(e => normalize(e, "soccer"));
    const nba = (n.events || []).map(e => normalize(e, "nba"));

    const mlb = (m.dates || []).flatMap(d =>
        d.games.map(g => ({
            id: g.gamePk,
            sport: "mlb",
            league: "MLB",
            home: g.teams.home.team.name,
            away: g.teams.away.team.name,
            time: g.gameDate,
            status: g.status.detailedState.includes("Final") ? "finished" : "upcoming"
        }))
    );

    matches = [...soccer, ...nba, ...mlb];

    render();
    setInterval(loadAll, 30000);
}

/* normalize */
function normalize(e, sport) {
    return {
        id: e.idEvent,
        sport,
        league: e.strLeague,
        home: e.strHomeTeam,
        away: e.strAwayTeam,
        time: e.dateEvent,
        status: "upcoming"
    };
}

/* AI MODEL (ELO + FORM) */
function aiScore(m) {

    const base = 50;

    const h = m.home.length;
    const a = m.away.length;

    const elo = (h - a) * 2;

    const form = Math.random() * 10;

    let home = base + elo + form;
    let away = 100 - home;

    home = Math.max(10, Math.min(90, home));
    away = 100 - home;

    return {
        home: Math.round(home),
        away: Math.round(away),
        value: Math.abs(home - 50)
    };
}

/* RENDER LIST */
function render() {

    const list = document.getElementById("list");
    const sport = document.getElementById("sport").value;

    list.innerHTML = "";

    const filtered = matches
        .filter(m => sport === "all" || m.sport === sport)
        .map(m => ({ ...m, ai: aiScore(m) }))
        .sort((a, b) => b.ai.value - a.ai.value); // AI推薦排序

    if (!filtered.length) {
        list.innerHTML = "<div class='loading'>沒有資料</div>";
        return;
    }

    filtered.forEach(m => {

        const div = document.createElement("div");
        div.className = "card";

        div.onclick = () => openDetail(m);

        div.innerHTML = `
            <div>
                ${m.league}
                <span class="score">${m.ai.home}%</span>
            </div>
            <div>${m.home} vs ${m.away}</div>
        `;

        list.appendChild(div);
    });
}

/* DETAIL PAGE */
function openDetail(m) {

    const ai = m.ai || aiScore(m);

    document.getElementById("listPage").style.display = "none";
    document.getElementById("detailPage").style.display = "block";

    document.getElementById("detail").innerHTML = `
        <h2>${m.home} vs ${m.away}</h2>
        <p>${m.league}</p>

        <div class="ai-box">
            🤖 AI分析模型（5.0）<br><br>
            主勝率：${ai.home}%<br>
            客勝率：${ai.away}%<br>
            差值：${ai.value}
        </div>

        <p>時間：${m.time}</p>
    `;

    history.pushState({}, "", "#match-" + m.id);
}

/* BACK */
function back() {
    document.getElementById("listPage").style.display = "block";
    document.getElementById("detailPage").style.display = "none";
}

/* filter */
document.getElementById("sport").onchange = render;

/* init */
loadAll();

</script>

</body>
</html>
