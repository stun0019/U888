<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports AI v4</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
padding:20px;
text-align:center;
background:#1e293b;
font-size:22px;
font-weight:bold;
}

.nav{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
padding:15px;
}

.nav button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#334155;
color:white;
cursor:pointer;
}

.nav button:hover{
background:#3b82f6;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:16px;
border-radius:12px;
margin-bottom:12px;
}

.title{
font-weight:bold;
font-size:18px;
display:flex;
justify-content:space-between;
}

.sub{
font-size:12px;
color:#94a3b8;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}

.box{
background:#334155;
padding:10px;
border-radius:8px;
text-align:center;
}

.badge{
padding:4px 8px;
border-radius:6px;
font-size:12px;
font-weight:bold;
}

.green{background:#14532d;color:#22c55e;}
.yellow{background:#422006;color:#facc15;}
.red{background:#450a0a;color:#ef4444;}
</style>
</head>

<body>

<header>Sports AI v4（ELO + Value + Kelly）</header>

<div class="nav">
<button onclick="loadSport('tennis_atp_wimbledon')">🎾 網球</button>
<button onclick="loadSport('basketball_nba')">🏀 NBA</button>
<button onclick="loadSport('soccer_epl')">⚽ 足球</button>
<button onclick="loadSport('baseball_mlb')">⚾ MLB</button>
</div>

<div class="container" id="matches"></div>

<script>

const API_KEY = "38e75c404956249117e5e414c38951a8";

/* --- 簡化 ELO（示意模型） --- */
const ELO = {
"defaultA": 1500,
"defaultB": 1500
};

/* 中文對照 */
const CN = {
"Lakers":"湖人",
"Warriors":"勇士",
"Yankees":"洋基",
"Red Sox":"紅襪",
"Liverpool":"利物浦",
"Arsenal":"阿森納"
};

function toCN(name){
return CN[name] || "";
}

/* ELO勝率 */
function eloProb(ra, rb){
return 1 / (1 + Math.pow(10, (rb - ra)/400));
}

function loadSport(sport){

fetch(
`https://api.the-odds-api.com/v4/sports/${sport}/odds/?apiKey=${API_KEY}&regions=us,eu,uk&markets=h2h&oddsFormat=decimal`
)
.then(r=>r.json())
.then(render);
}

/* EV */
function calcEV(p, odds){
return (p * odds - 1);
}

/* Kelly */
function kelly(p, odds){
return ((p * odds - 1) / (odds - 1));
}

function render(data){

if(!data || data.length === 0){
document.getElementById("matches").innerHTML = "無資料";
return;
}

/* 排序 */
data.sort((a,b)=>
new Date(a.commence_time) - new Date(b.commence_time)
);

let html = "";

data.forEach(m=>{

if(!m.bookmakers?.length) return;

const market = m.bookmakers[0].markets[0];
if(!market) return;

const away = market.outcomes.find(x=>x.name===m.away_team);
const home = market.outcomes.find(x=>x.name===m.home_team);
if(!away || !home) return;

/* 隱含勝率 */
const aImp = 1/away.price;
const hImp = 1/home.price;
const sum = aImp + hImp;

const aP = aImp/sum;
const hP = hImp/sum;

/* 假 ELO */
const ra = 1500 + Math.random()*100;
const rb = 1500 + Math.random()*100;

const eloA = eloProb(ra, rb);
const eloH = 1 - eloA;

/* Value */
const vA = calcEV(eloA, away.price);
const vH = calcEV(eloH, home.price);

/* 判斷推薦 */
let pick, pickProb, pickOdds, value;

if(vA > vH){
pick = m.away_team;
pickProb = eloA;
pickOdds = away.price;
value = vA;
}else{
pick = m.home_team;
pickProb = eloH;
pickOdds = home.price;
value = vH;
}

/* Kelly */
const k = kelly(pickProb, pickOdds);

/* 冷門警告 */
let warn = "";
if(value > 0.05){
warn = `<span class="badge green">Value Bet</span>`;
}else if(value < 0){
warn = `<span class="badge red">負期望</span>`;
}else{
warn = `<span class="badge yellow">一般</span>`;
}

html += `
<div class="card">

<div class="title">
<div>
${m.away_team}
<div class="sub">${toCN(m.away_team)}</div>
</div>

<div>VS</div>

<div>
${m.home_team}
<div class="sub">${toCN(m.home_team)}</div>
</div>
</div>

<div class="sub">
🕒 ${new Date(m.commence_time).toLocaleString()}
</div>

<div class="grid">

<div class="box">
客隊<br>${away.price}<br>${(aP*100).toFixed(1)}%
</div>

<div class="box">
主隊<br>${home.price}<br>${(hP*100).toFixed(1)}%
</div>

</div>

<br>

<div>
🎯 推薦：<b>${pick}</b>
</div>

<div class="sub">
ELO勝率 ${(pickProb*100).toFixed(1)}% ｜ EV ${(value*100).toFixed(2)}%
</div>

<div class="sub">
Kelly ${(k*100).toFixed(2)}%
</div>

<div style="margin-top:8px;">
${warn}
</div>

</div>
`;
});

document.getElementById("matches").innerHTML = html;
}

loadSport("tennis_atp_wimbledon");

</script>

</body>
</html>
