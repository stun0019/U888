<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣上市股票行情</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f5f7f9; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 15px; margin-bottom: 20px; }
        .btn { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        .btn:disabled { background-color: #ccc; }
        .search-input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 4px; width: 250px; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; position: sticky; top: 0; }
        tr:hover { background-color: #f1f3f5; }
        .up { color: #eb2f96; font-weight: bold; }
        .down { color: #389e0d; font-weight: bold; }
        .loading { text-align: center; padding: 20px; font-size: 16px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>台灣上市股票行情 (每20秒自動更新)</h1>
        <div>
            <span id="updateTime" style="color: #666; margin-right: 10px;">尚未更新</span>
            <button id="refreshBtn" class="btn" onclick="fetchStockData()">手動更新</button>
        </div>
    </div>

    <input type="text" id="searchInput" class="search-input" placeholder="輸入代號或名稱搜尋..." oninput="filterData()">

    <div style="overflow-x: auto; max-height: 600px;">
        <table>
            <thead>
                <tr>
                    <th>股票代號</th>
                    <th>股票名稱</th>
                    <th>開盤價</th>
                    <th>最高價</th>
                    <th>最低價</th>
                    <th>收盤價 (股價)</th>
                    <th>成交股數</th>
                </tr>
            </thead>
            <tbody id="stockTableBody">
                <tr><td colspan="7" class="loading">資料載入中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 使用證交所最穩定的每日收盤行情 API (支援前端 CORS)
    const API_URL = 'https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL'; 
    let allStocks = [];

    async function fetchStockData() {
        const btn = document.getElementById('refreshBtn');
        const timeSpan = document.getElementById('updateTime');
        btn.disabled = true;
        timeSpan.textContent = '更新中...';

        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error(`HTTP 錯誤! 狀態碼: ${response.status}`);
            
            const data = await response.json();
            
            if (!Array.isArray(data)) {
                throw new Error('API 回傳格式異常');
            }

            // 自動相容中英文欄位名稱
            allStocks = data.map(item => ({
                code: item.Code || item.CodeNo || item.股票代號 || '',
                name: item.Name || item.股票名稱 || '',
                open: item.OpenPrice || item.開盤價 || '--',
                high: item.HighPrice || item.最高價 || '--',
                low: item.LowPrice || item.最低價 || '--',
                price: item.ClosingPrice || item.收盤價 || item.TradePrice || '--',
                volume: item.TradeVolume || item.成交股數 || '0'
            })).filter(stock => stock.code !== ''); // 過濾空資料

            renderTable(allStocks);
            timeSpan.textContent = `最後更新：${new Date().toLocaleTimeString()}`;
        } catch (error) {
            console.error('抓取失敗:', error);
            timeSpan.textContent = `錯誤: ${error.message}`;
            document.getElementById('stockTableBody').innerHTML = `
                <tr><td colspan="7" class="loading" style="color:red;">資料抓取失敗 (${error.message})，請檢查網路或稍後再試。</td></tr>
            `;
        } finally {
            btn.disabled = false;
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('stockTableBody');
        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="loading">查無資料</td></tr>`;
            return;
        }

        tbody.innerHTML = data.map(stock => {
            let priceClass = '';
            const p = parseFloat(stock.price);
            const o = parseFloat(stock.open);
            if (!isNaN(p) && !isNaN(o)) {
                if (p > o) priceClass = 'up';
                else if (p < o) priceClass = 'down';
            }

            return `
                <tr>
                    <td><b>${stock.code}</b></td>
                    <td>${stock.name}</td>
                    <td>${stock.open}</td>
                    <td>${stock.high}</td>
                    <td>${stock.low}</td>
                    <td class="${priceClass}">${stock.price}</td>
                    <td>${Number(stock.volume).toLocaleString()}</td>
                </tr>
            `;
        }).join('');
    }

    function filterData() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!keyword) {
            renderTable(allStocks);
            return;
        }
        const filtered = allStocks.filter(stock => 
            stock.code.toLowerCase().includes(keyword) || 
            stock.name.toLowerCase().includes(keyword)
        );
        renderTable(filtered);
    }

    // 初始化與定時器
    fetchStockData();
    setInterval(fetchStockData, 20000);
</script>

</body>
</html>
