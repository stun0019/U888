<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>運彩資訊平台 4.0</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b1220;
    color: white;
}

/* header */
header {
    padding: 16px;
    text-align: center;
    background: #111827;
    font-weight: bold;
}

/* layout */
.container {
    max-width: 1000px;
    margin: auto;
    padding: 15px;
}

/* filters */
.filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 10px;
}

select, input {
    padding: 7px;
    border-radius: 6px;
    border: none;
}

/* card */
.card {
    background: #1f2937;
    margin: 10px 0;
    padding: 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    background: #273449;
    transform: scale(1.01);
}

.league {
    font-size: 12px;
    color: #94a3b8;
}

.match {
    font-size: 16px;
    font-weight: bold;
}

.time {
    font-size: 12px;
    color: #cbd5e1;
}

/* badge */
.badge {
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 12px;
}

.upcoming { background: #2563eb; }
.finished { background: #ef4444; }

/* modal */
.modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal-box {
    background: #111827;
    padding: 20px;
    border-radius: 12px;
    width: 90%;
    max-width: 500px;
}

.close {
    float: right;
    cursor: pointer;
    color: red;
}

/* AI box */
.ai {
    background: #0f172a;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
}

/* favorite */
.star {
    float: right;
    cursor: pointer;
    color: gold;
}

.loading {
    text-align: center;
    padding: 20px;
}
</style>

</head>

<body>

<header>運彩資訊平台 4.0（AI + 收藏 + 即時版）</header>

<div class="container">

<div class="filters">

<select id="sport">
<option value="all">全部</option>
<option value="soccer">足球</option>
<option value="nba">NBA</option>
<option value="mlb">MLB</option>
</select>

<select id="status">
<option value="all">全部狀態</option>
<option value="upcoming">賽程</option>
<option value="finished">賽果</option>
</select>

<input type="date" id="date">

</div>

<div id="list"></div>

</div>

<!-- modal -->
<div class="modal" id="modal">
<div class="modal-box">

<span class="close" onclick="closeModal()">X</span>
<div id="modalBody"></div>

</div>
</div>

<script>

const API_S = "https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4328";
const API_N = "https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4387";
const API_M = "https://statsapi.mlb.com/api/v1/schedule?sportId=1";

let matches = [];
let cache = {};
let favorites = JSON.parse(localStorage.getItem("fav") || "[]");

/* fetch + cache layer */
async function get(url) {

    if (cache[url] && Date.now() - cache[url].time < 30000) {
        return cache[url].data;
    }

    const res = await fetch(url);
    const data = await res.json();

    cache[url] = { data, time: Date.now() };

    return data;
}

/* load */
async function load() {

    const [s, n, m] = await Promise.all([
        get(API_S),
        get(API_N),
        get(API_M)
    ]);

    const soccer = (s.events || []).map(e => normalize(e, "soccer"));
    const nba = (n.events || []).map(e => normalize(e, "nba"));

    const mlb = (m.dates || []).flatMap(d =>
        d.games.map(g => ({
            sport: "mlb",
            league: "MLB",
            home: g.teams.home.team.name,
            away: g.teams.away.team.name,
            time: new Date(g.gameDate).toLocaleString("zh-TW"),
            status: g.status.detailedState.includes("Final") ? "finished" : "upcoming"
        }))
    );

    matches = [...soccer, ...nba, ...mlb];

    render();
    setInterval(load, 30000);
}

/* normalize */
function normalize(e, sport) {
    return {
        id: e.idEvent,
        sport,
        league: e.strLeague,
        home: e.strHomeTeam,
        away: e.strAwayTeam,
        time: `${e.dateEvent} ${e.strTime}`,
        status: "upcoming"
    };
}

/* AI ELO */
function elo(match) {

    const h = match.home.length * 10;
    const a = match.away.length * 10;

    const diff = h - a;

    const home = 50 + diff;
    const away = 100 - home;

    return {
        home: Math.max(10, Math.min(90, Math.round(home))),
        away: Math.max(10, Math.min(90, Math.round(away)))
    };
}

/* render */
function render() {

    const list = document.getElementById("list");
    list.innerHTML = "";

    const sport = document.getElementById("sport").value;
    const status = document.getElementById("status").value;

    const filtered = matches.filter(m => {

        if (sport !== "all" && m.sport !== sport) return false;
        if (status !== "all" && m.status !== status) return false;

        return true;
    });

    if (!filtered.length) {
        list.innerHTML = `<div class="loading">沒有資料</div>`;
        return;
    }

    filtered.forEach(m => {

        const star = favorites.includes(m.home) ? "⭐" : "☆";

        const div = document.createElement("div");
        div.className = "card";

        div.onclick = () => openModal(m);

        div.innerHTML = `
            <div class="league">${m.league}</div>
            <div class="match">
                ${m.home} vs ${m.away}
                <span class="star" onclick="toggleFav(event,'${m.home}')">${star}</span>
            </div>
            <div class="time">${m.time}</div>
            <div class="badge ${m.status}">${m.status}</div>
        `;

        list.appendChild(div);
    });
}

/* favorite */
function toggleFav(e, team) {

    e.stopPropagation();

    if (favorites.includes(team)) {
        favorites = favorites.filter(f => f !== team);
    } else {
        favorites.push(team);
    }

    localStorage.setItem("fav", JSON.stringify(favorites));
    render();
}

/* modal */
function openModal(m) {

    const p = elo(m);

    document.getElementById("modalBody").innerHTML = `
        <h3>${m.home} vs ${m.away}</h3>
        <p>${m.league}</p>
        <p>${m.time}</p>

        <div class="ai">
            🤖 ELO AI分析<br>
            主隊勝率：${p.home}%<br>
            客隊勝率：${p.away}%
        </div>
    `;

    document.getElementById("modal").style.display = "flex";

    history.pushState({}, "", "#match-" + (m.id || m.home));
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

/* filters */
document.getElementById("sport").onchange = render;
document.getElementById("status").onchange = render;

load();

</script>

</body>
</html>
