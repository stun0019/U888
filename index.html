<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣上市櫃股票即時行情</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 20px;
            background-color: #f5f7f9;
            color: #333;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        h1 { margin: 0; font-size: 24px; color: #0056b3; }
        .btn {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover { background-color: #0056b3; }
        .btn:disabled { background-color: #cccccc; cursor: not-allowed; }
        .status { font-size: 14px; color: #666; }
        
        /* 搜尋與篩選 */
        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .search-input {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 250px;
        }

        /* 表格樣式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f8f9fa;
            position: sticky;
            top: 0;
            color: #495057;
        }
        tr:hover { background-color: #f1f3f5; }
        
        /* 漲跌顏色呈現 */
        .up { color: #eb2f96; font-weight: bold; }   /* 台灣習慣：紅漲 */
        .down { color: #389e0d; font-weight: bold; } /* 台灣習慣：綠跌 */
        .loading { text-align: center; padding: 4px; font-size: 18px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>台灣上市櫃股票即時行情 (每20秒自動更新)</h1>
        <div>
            <span id="updateTime" class="status">尚未更新</span>
            <button id="refreshBtn" class="btn" onclick="fetchStockData()">手動重新整理</button>
        </div>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" class="search-input" placeholder="輸入代號或名稱搜尋..." oninput="filterData()">
    </div>

    <div style="overflow-x: auto; max-height: 600px;">
        <table>
            <thead>
                <tr>
                    <th>股票代號</th>
                    <th>股票名稱</th>
                    <th>當盤開盤價</th>
                    <th>當盤最高價</th>
                    <th>當盤最低價</th>
                    <th>當盤成交價 (股價)</th>
                    <th>累積成交量</th>
                </tr>
            </thead>
            <tbody id="stockTableBody">
                <tr>
                    <td colspan="7" class="loading">資料載入中...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 採用政府開放資料：每日公佈之盤中不含零股個股即時行情
    const API_URL = 'https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_AVG_ALL'; 
    // 備用開放資料 API（若上方 API 欄位不符需求可替換為：https://openapi.twse.com.tw/v1/stock/t187ap14_ALL ）
    
    let allStocks = [];

    // 自動抓取主程式
    async function fetchStockData() {
        const btn = document.getElementById('refreshBtn');
        const timeSpan = document.getElementById('updateTime');
        btn.disabled = true;
        timeSpan.textContent = '更新中...';

        try {
            // 由於證交所每日盤中快取 API 
            const response = await fetch('https://openapi.twse.com.tw/v1/stock/t187ap14_ALL');
            if (!response.ok) throw new Error('API 請求失敗');
            
            const data = await response.json();
            
            // 資料格式化
            allStocks = data.map(item => ({
                code: item.Code || item.股票代號,
                name: item.Name || item.股票名稱,
                open: item.OpenPrice || item.開盤價 || '--',
                high: item.HighPrice || item.最高價 || '--',
                low: item.LowPrice || item.最低價 || '--',
                price: item.TradePrice || item.當盤成交價 || item.收盤價 || '--',
                volume: item.TradeVolume || item.成交量 || '--'
            }));

            renderTable(allStocks);
            timeSpan.textContent = `最後更新時間：${new Date().toLocaleTimeString()}`;
        } catch (error) {
            console.error(error);
            timeSpan.textContent = '更新失敗，請檢查網路或稍後再試';
        } finally {
            btn.disabled = false;
        }
    }

    // 渲染表格內容
    function renderTable(data) {
        const tbody = document.getElementById('stockTableBody');
        if (data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="loading">查無資料</td></tr>`;
            return;
        }

        tbody.innerHTML = data.map(stock => {
            // 判斷股價是否大於開盤價（簡單標示紅綠，因開盤資料可能為 '--'，做基本防錯）
            let priceClass = '';
            const p = parseFloat(stock.price);
            const o = parseFloat(stock.open);
            if (!isNaN(p) && !isNaN(o)) {
                if (p > o) priceClass = 'up';
                else if (p < o) priceClass = 'down';
            }

            return `
                <tr>
                    <td><b>${stock.code}</b></td>
                    <td>${stock.name}</td>
                    <td>${stock.open}</td>
                    <td>${stock.high}</td>
                    <td>${stock.low}</td>
                    <td class="${priceClass}">${stock.price}</td>
                    <td>${Number(stock.volume).toLocaleString()}</td>
                </tr>
            `;
        }).join('');
    }

    // 前端即時搜尋過濾
    function filterData() {
        const keyword = document.getElementById('searchInput').value.trim().toLowerCase();
        if (!keyword) {
            renderTable(allStocks);
            return;
        }
        const filtered = allStocks.filter(stock => 
            stock.code.toLowerCase().includes(keyword) || 
            stock.name.toLowerCase().includes(keyword)
        );
        renderTable(filtered);
    }

    // 初始化載入
    fetchStockData();

    // 設定每 20 秒自動抓取更新一次 (20000 毫秒)
    setInterval(fetchStockData, 20000);
</script>

</body>
</html>
