<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>運彩資訊平台 2.0</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

header {
    padding: 20px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    background: #111827;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

/* filters */
.filters {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

select, input {
    padding: 8px;
    border-radius: 6px;
    border: none;
}

/* cards */
.card {
    background: #1e293b;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.2s;
}

.card:hover {
    transform: scale(1.01);
    background: #273449;
}

.league {
    font-size: 12px;
    color: #94a3b8;
}

.match {
    font-size: 16px;
    font-weight: bold;
}

.time {
    font-size: 12px;
    color: #cbd5e1;
}

.status {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
}

.upcoming {
    background: #2563eb;
}

.finished {
    background: #ef4444;
}

.loading {
    text-align: center;
    padding: 20px;
    color: #94a3b8;
}

.empty {
    text-align: center;
    padding: 20px;
    color: #64748b;
}
</style>

</head>

<body>

<header>運彩資訊平台 2.0</header>

<div class="container">

<div class="filters">

<select id="sport">
    <option value="all">全部運動</option>
    <option value="soccer">足球</option>
    <option value="nba">NBA</option>
    <option value="mlb">MLB</option>
</select>

<select id="status">
    <option value="all">全部狀態</option>
    <option value="upcoming">賽程</option>
    <option value="finished">賽果</option>
</select>

<input type="date" id="date">

</div>

<div id="loading" class="loading">載入中賽事資料...</div>

<div id="list"></div>

</div>

<script>

const API = "https://www.thesportsdb.com/api/v1/json/3/eventsnextleague.php?id=4328";

let matches = [];

async function loadData() {

    try {
        const res = await fetch(API);
        const json = await res.json();

        matches = (json.events || []).map(e => ({
            sport: "soccer",
            league: e.strLeague,
            home: e.strHomeTeam,
            away: e.strAwayTeam,
            time: formatTime(e.dateEvent, e.strTime),
            status: "upcoming"
        }));

        document.getElementById("loading").style.display = "none";

        render();

    } catch (err) {
        document.getElementById("loading").innerText = "載入失敗";
    }
}

function formatTime(date, time) {
    return new Date(`${date}T${time || "00:00:00"}Z`)
        .toLocaleString("zh-TW", { timeZone: "Asia/Taipei", hour12: false });
}

function render() {

    const sport = document.getElementById("sport").value;
    const status = document.getElementById("status").value;
    const list = document.getElementById("list");

    list.innerHTML = "";

    const filtered = matches.filter(m => {

        if (sport !== "all" && m.sport !== sport) return false;
        if (status !== "all" && m.status !== status) return false;

        return true;
    });

    if (filtered.length === 0) {
        list.innerHTML = `<div class="empty">沒有符合條件的賽事</div>`;
        return;
    }

    filtered.forEach(m => {

        const div = document.createElement("div");
        div.className = "card";

        div.innerHTML = `
            <div>
                <div class="league">${m.league}</div>
                <div class="match">${m.home} vs ${m.away}</div>
                <div class="time">${m.time}</div>
            </div>

            <div class="status upcoming">${m.status}</div>
        `;

        list.appendChild(div);
    });
}

document.getElementById("sport").addEventListener("change", render);
document.getElementById("status").addEventListener("change", render);

loadData();

</script>

</body>
</html>
