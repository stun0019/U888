<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sports AI 分析中心</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#1e293b;
padding:20px;
text-align:center;
font-size:26px;
font-weight:bold;
}

.nav{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
padding:15px;
}

.nav button{
padding:10px 18px;
border:none;
border-radius:8px;
background:#334155;
color:white;
cursor:pointer;
}

.nav button:hover{
background:#3b82f6;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
background:#1e293b;
padding:18px;
border-radius:12px;
margin-bottom:12px;
}

.title{
font-size:18px;
font-weight:bold;
margin-bottom:5px;
}

.time{
color:#94a3b8;
font-size:14px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.box{
background:#334155;
padding:10px;
border-radius:8px;
}

.good{color:#22c55e;}
.bad{color:#ef4444;}
.warn{color:#facc15;}

.small{
font-size:13px;
color:#94a3b8;
}

button.load{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
background:#3b82f6;
color:white;
cursor:pointer;
}

button.load:hover{
background:#2563eb;
}

</style>
</head>

<body>

<header>Sports AI 賽事分析系統</header>

<div class="nav">

<button onclick="loadSport('tennis_atp_wimbledon')">🎾 網球</button>
<button onclick="loadSport('basketball_nba')">🏀 NBA</button>
<button onclick="loadSport('soccer_epl')">⚽ 足球</button>
<button onclick="loadSport('baseball_mlb')">⚾ MLB</button>

</div>

<div class="container">

<button class="load" onclick="loadSport(currentSport)">
載入 / 更新賽事
</button>

<div id="matches"></div>

</div>

<script>

const API_KEY = "38e75c404956249117e5e414c38951a8";

let currentSport = "tennis_atp_wimbledon";

function loadSport(sport){

currentSport = sport;

fetch(
`https://api.the-odds-api.com/v4/sports/${sport}/odds/?apiKey=${API_KEY}&regions=eu&markets=h2h&oddsFormat=decimal`
)
.then(res=>res.json())
.then(data=>render(data))
.catch(err=>{
document.getElementById("matches").innerHTML =
"API 讀取失敗";
console.error(err);
});
}

function calc(awayOdds, homeOdds, away, home){

const a = 1 / awayOdds;
const h = 1 / homeOdds;

const total = a + h;

const awayP = (a/total)*100;
const homeP = (h/total)*100;

let recommend, ev;

if(awayP > homeP){
recommend = away;
ev = (awayP/100 * awayOdds - 1) * 100;
}else{
recommend = home;
ev = (homeP/100 * homeOdds - 1) * 100;
}

return {
awayP: awayP.toFixed(2),
homeP: homeP.toFixed(2),
ev: ev.toFixed(2),
recommend
};
}

function render(matches){

let html = "";

if(!matches || matches.length === 0){
document.getElementById("matches").innerHTML =
"無資料";
return;
}

matches.forEach(m=>{

if(!m.bookmakers?.length) return;

const book = m.bookmakers[0];
const market = book.markets[0];
if(!market) return;

const away = market.outcomes.find(x=>x.name===m.away_team);
const home = market.outcomes.find(x=>x.name===m.home_team);
if(!away || !home) return;

const r = calc(
away.price,
home.price,
m.away_team,
m.home_team
);

html += `
<div class="card">

<div class="title">
${m.away_team} vs ${m.home_team}
</div>

<div class="time">
🕒 ${new Date(m.commence_time).toLocaleString()}
</div>

<div class="grid">

<div class="box">
客隊<br>
${away.price}<br>
<span class="small">${r.awayP}%</span>
</div>

<div class="box">
主隊<br>
${home.price}<br>
<span class="small">${r.homeP}%</span>
</div>

</div>

<br>

<div class="good">
推薦：${r.recommend}
</div>

<div class="warn">
EV：${r.ev}%
</div>

</div>
`;
});

document.getElementById("matches").innerHTML = html;

}

loadSport(currentSport);

</script>

</body>
</html>
