<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>運彩賽事表</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    padding:20px;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td{
    border:1px solid #334155;
    padding:10px;
    text-align:left;
}

th{
    background:#1e293b;
}

tr:nth-child(even){
    background:#172033;
}
</style>
</head>
<body>

<h1>今日運彩賽事</h1>

<table>
    <thead>
        <tr>
            <th>聯盟</th>
            <th>主隊</th>
            <th>客隊</th>
            <th>開賽時間</th>
        </tr>
    </thead>
    <tbody id="games"></tbody>
</table>

<script>

const TOKEN = "YOUR_JBOT_TOKEN";

async function loadGames(){

    const today = new Date().toISOString().split('T')[0];

    const url =
`https://api.sportsbot.tech/v2/odds?sport=FTB&date=${today}`;

    const res = await fetch(url,{
        headers:{
            "X-JBot-Token":TOKEN
        }
    });

    const data = await res.json();

    const tbody = document.getElementById("games");

    data.forEach(game=>{

        tbody.innerHTML += `
        <tr>
            <td>${game.league}</td>
            <td>${game.home}</td>
            <td>${game.away}</td>
            <td>${game.matchTime}</td>
        </tr>
        `;
    });
}

loadGames();

</script>

</body>
</html>
